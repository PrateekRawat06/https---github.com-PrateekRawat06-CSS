<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.Transform.html</title>
    <style>

        #box1{
            height: 200px;
            width: 200px;
            background-color: aqua;
            border: 2px solid black;
            font-size: 20px;
            position: absolute;
            top: 250px;
            left: 150px;
            transform: scale(2);
        }

        #box2{
            height: 200px;
            width: 200px;
            background-color: red;
            border: 2px solid black;
            font-size: 20px;
            position: absolute;
            top: 100px;
            left: 450px;
            transform: scale(0.5);
        }

        #box3{
            height: 200px;
            width: 200px;
            background-color: orange;
            border: 2px solid black;
            font-size: 20px;
            position: absolute;
            top: 250px;
            left: 650px;
            transform: scale(1,2);
        }
    </style>
</head>
<body>
    <h1>1.Transform</h1>
    <h3>a.Scale</h3>
    <div id="box1">This is Box1</div>
    <div id="box2">This is Box2</div>
    <div id="box3">This is Box3</div>
</body>
</html>
