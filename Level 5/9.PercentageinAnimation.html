<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9.PercentageinAnimation.html</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-color: aqua;
            border: 2px solid black;
            position: absolute;
            top: 100px;
            left: 100px;
            animation: coloranimate 4s ease-in 0s infinite alternate;
        }

        @keyframes coloranimate{
            0%{
                left: 0px;
                background-color: yellow;
                font-size: 20px;
                color: red;
            }
            50%{
                background-color: blue;
                font-size: 30px;
                color: black;
            }
            100%{
                left: 750px;
                background-color: red;
                font-size: 40px;
                color: yellow;
                rotate: 12000deg;
            }
        }
    </style>
<body>
    <div>
        This is Box
    </div>
</body>
</html>
