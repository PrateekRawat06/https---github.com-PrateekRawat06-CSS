<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10.PracticeSet8Question1.html</title>
    <style>
       .loader{
            height: 200px;
            width: 200px;
            border-radius: 50%;
            border: 20px solid #51CED9;
            border-top: 20px solid #7A4ED9;
            animation: spinanimate 1s linear 0s infinite normal;
       }
       @keyframes spinanimate{
        form{
            transform: rotate(0deg);
        }
        to{
            transform: rotate(360deg);
        }
       }
    </style>
<body>
    <div class="loader"></div>
</body>
