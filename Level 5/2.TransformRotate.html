<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.Transform.html</title>
    <style>
        div{
            transition: all 2s ease-in 0.2s;
        }
        div:hover{
            transform: rotate(90deg);
        }
        div:active{
            transform: rotate(360deg);
        }

        #box1{
            height: 200px;
            width: 200px;
            background-color: aqua;
            border: 2px solid black;
            font-size: 20px;
            position: absolute;
            top: 150px;
            left: 50px;
            transform: rotate(45deg);
        }

        #box2{
            height: 200px;
            width: 200px;
            background-color: red;
            border: 2px solid black;
            font-size: 20px;
            position: absolute;
            top: 150px;
            left: 400px;
            transform: rotate(90deg);
        }

        #box3{
            height: 200px;
            width: 200px;
            background-color: orange;
            border: 2px solid black;
            font-size: 20px;
            position: absolute;
            top: 150px;
            left: 700px;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <h1>1.Transform</h1>
    <h3>a.Rotate</h3>
    <div>
    <div id="box1">This is Box1</div>
    <div id="box2">This is Box2</div>
    <div id="box3">This is Box3</div>
    </div>
</body>
</html>
