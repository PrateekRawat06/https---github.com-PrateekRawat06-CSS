<!DOCTYPE html>
<html>
    <head>
        <title>Padding Shorthand</title>
        <style>
            h1{
                border-style: solid;
                border-width: 2px;
                border-color: lightblue;
                padding: 20px;
            }

            div{
                border-style: solid;
                border-width: 2px;
                border-color: lightblue;
                padding: 1px 2px 3px 4px;
            }
        </style>
    </head>
    <h1>Shorthand Padding</h1>
    <div>Example of Shorthand Padding</div>
</html>
