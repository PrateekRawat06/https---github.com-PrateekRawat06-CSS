<!DOCTYPE html>
<html>
    <head>
        <title>Forground Color Property</title>
        <!--style tag is used inn foreground color property-->
        <style>
            h2{
                color:purple
            }
        </style>
        <link rel="stylesheet" href="7.StyleforForegroundColorProperty.css">
    </head>
    <body>
        <!--inline is used in foreground color property -->
        <h1 style="color:red">Foreground Color Property</h1>
        <h2>Used to set the color of foreground</h2>
        <!--and we can use external stylesheet in foreground color property-->
        <h5>and we can use external stylesheet in foreground color property</h5>
    </body>
</html>
