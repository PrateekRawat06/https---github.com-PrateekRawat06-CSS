<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8.AnimationShorthand.html</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-color: aqua;
            border: 2px solid black;
            position: absolute;
            top: 100px;
            left: 100px;
            animation: coloranimate 2s ease-in 0s infinite alternate;
        }

        @keyframes coloranimate{
            from{
                left: 100px;
                background-color: yellow;
                color: red;
            }
            to{
                left: 750px;
                background-color: red;
                color: yellow;
            }
        }
    </style>
<body>
    <div>
        This is Box
    </div>
</body>
</html>
