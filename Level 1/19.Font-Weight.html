<!DOCTYPE html>
<html>
    <head>
        <title>Font-Weight</title>
        <style>
            #h1{
                font-weight: normal;
            }

            
            #h2{
                font-weight: bold ;
            }

            
            #h3{
                font-weight: bolder;
            }

            
            #h4{
                font-weight: lighter;
            }

            #h5{
                font-weight: 800;
            }
        </style>
    </head>
    <body>
        <h1 id="h1">heading 1</h1>
        <h1 id="h2">heading 2</h1>
        <h1 id="h3">heading 3</h1>
        <h1 id="h4">heading 4</h1>
        <h1 id="h5">heading 5</h1>
    </body>
</html>
