<!DOCTYPE html>
<html>
    <head>
        <title>Border Radius</title>
        <style>
            #div1{
                text-align: center;
                height: 50px;
                width: 50px;
                border: 2px solid blue;
                border-radius: 1px;
            }

            #div2{
                text-align: center;
                height: 50px;
                width: 50px;
                border: 2px solid pink;
                border-radius: 10px;
            }

            #div3{
                text-align: center;
                height: 50px;
                width: 50px;
                border: 2px solid gray;
                border-radius: 20px;
            }
        </style>
    </head>
    <body>
        <div id="div1">div 1</div>
        <br>
        <div id="div2">div 2</div>
        <br>
        <div id="div3">div 3</div>
    </body>
</html>
