<!DOCTYPE html>
<html>
    <head>
        <title>Text-Align</title>
        <style>
            h1{
    text-decoration: underline;
}

h2{
    text-decoration: overline;
}

h3{
    text-decoration: line-through;
}
        </style>
    </head>
    <body>
        <h1>Text-Decoration Underline</h1>
        <h2>Text-Decoration  Overline</h2>
        <h3>Text-Decoration line-through</h3>
    </body>
</html>
